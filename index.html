<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>WIKIQUEST — Yaava Route?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Baloo+Tamma+2:wght@500;600;700&family=Inter:wght@400;500;600;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --board: #14201A;
    --board-deep: #0D1712;
    --amber: #FFB300;
    --amber-dim: rgba(255,179,0,0.55);
    --red: #E1503E;
    --green: #4CAF6D;
    --frame: #545B54;
    --cream: #F3EFE2;
    --ink: #1B1F1C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--board-deep);
    color: var(--cream);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  .kn{ font-family:'Baloo Tamma 2', 'Baloo 2', sans-serif; }
  .display{ font-family:'Baloo 2', 'Baloo Tamma 2', sans-serif; font-weight:700; }
  .led{ font-family:'VT323', monospace; letter-spacing: 0.03em; }

  /* ---------- Bus board top chrome ---------- */
  .topbar{
    position: sticky; top:0; z-index: 20;
    background: var(--board);
    border-bottom: 4px solid var(--frame);
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    padding: 10px 12px 12px;
  }
  .brand{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
  .brand h1{
    font-size: 1.15rem; margin:0; color: var(--amber);
    text-shadow: 0 0 6px var(--amber-dim);
    letter-spacing: 0.02em;
  }
  .brand h1 span{ color: var(--cream); font-weight:500; opacity:0.85; }
  .top-actions{ display:flex; align-items:center; gap:6px; }
  .hint-btn{
    font-family:'Baloo 2', sans-serif; font-size:0.68rem; font-weight:700;
    background: var(--amber); color: var(--ink); border: none;
    border-radius:999px; padding:6px 11px; cursor:pointer; white-space:nowrap;
  }
  .hint-btn:active{ transform: translateY(1px); }
  .clicks{ font-family:'VT323', monospace; font-size:1rem; color: var(--green); white-space:nowrap; }

  .board-frame{
    border: 3px solid var(--frame); border-radius:6px; background: var(--board-deep);
    padding: 8px 10px; position: relative;
  }
  .board-frame::before, .board-frame::after{
    content:""; position:absolute; top:4px; width:6px; height:6px; border-radius:50%;
    background: var(--frame);
  }
  .board-frame::before{ left:4px; }
  .board-frame::after{ right:4px; }
  .board-row{ display:flex; gap:10px; }
  .board-cell{ flex:1; min-width:0; }
  .board-label{
    font-family:'Baloo Tamma 2','Baloo 2',sans-serif; font-size:0.62rem; color: var(--frame);
    text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:2px;
  }
  .board-value{
    font-family:'VT323', monospace; font-size:1.35rem; line-height:1.05;
    color: var(--amber); text-shadow: 0 0 5px var(--amber-dim);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .board-cell.dest .board-value{ color: var(--red); text-shadow: 0 0 5px rgba(225,80,62,0.6); }

  .player-strip{
    margin-top:8px; font-family:'Baloo 2', sans-serif; font-size:0.72rem; color: var(--cream); opacity:0.75;
  }
  .player-strip span{ color: var(--green); font-weight:600; }

  .trail-strip{ margin-top:8px; display:flex; align-items:center; gap:0; overflow-x:auto; padding-bottom:2px; }
  .trail-chip{
    font-family:'VT323', monospace; font-size:0.9rem; background: var(--board); border:1px solid var(--frame);
    border-radius: 4px; padding:2px 8px; white-space:nowrap; color: var(--cream); opacity:0.7; flex-shrink:0;
  }
  .trail-chip.current{ background: var(--green); color: var(--ink); opacity:1; font-weight:700; }
  .trail-dots{ width:12px; height:1px; border-top: 2px dotted var(--frame); flex-shrink:0; margin: 0 2px; }

  /* ---------- Article area (readable, on cream card) ---------- */
  #article-wrap{ padding: 16px 14px 90px; max-width: 720px; margin: 0 auto; }
  #article{
    background: var(--cream); color: var(--ink); border-radius: 10px; padding: 18px 16px;
    font-size: 1rem; line-height: 1.65; box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  }
  #article h1.article-title{
    font-family:'Baloo 2', sans-serif; font-size:1.5rem; font-weight:700; margin: 0 0 0.5em; color: var(--ink);
  }
  #article p{ margin: 0.85em 0; }
  #article a{ color: var(--red); text-decoration: underline; text-decoration-color: rgba(225,80,62,0.35); text-underline-offset:2px; cursor:pointer; font-weight:600; }
  #article a.na-link{ color: #8a8578; text-decoration:none; cursor:default; border-bottom:1px dotted #8a8578; font-weight:400; }
  #article a.hint-glow{
    background: var(--amber); color: var(--ink) !important; padding: 1px 5px; border-radius:4px;
    text-decoration:none; box-shadow: 0 0 0 2px var(--red);
  }

  .center-screen{ min-height: 74vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 24px; }
  .board-icon{
    font-family:'VT323', monospace; font-size:2.6rem; color: var(--amber); text-shadow: 0 0 8px var(--amber-dim);
    border: 3px solid var(--frame); border-radius:8px; padding: 4px 20px; margin-bottom: 14px; background: var(--board);
  }
  .center-screen h2{ font-family:'Baloo 2', sans-serif; font-size:1.55rem; margin: 0 0 6px; color: var(--cream); }
  .center-screen .kn-line{ font-size:1.1rem; color: var(--amber); margin-bottom: 10px; }
  .center-screen p{ max-width: 420px; color: var(--cream); opacity:0.8; line-height:1.6; margin: 0 0 22px; font-size:0.95rem; }
  .btn{
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:0.95rem;
    background: var(--amber); color: var(--ink); border:none;
    padding: 12px 26px; border-radius:8px; cursor:pointer;
    box-shadow: 0 4px 0 var(--red);
  }
  .btn:active{ transform: translateY(3px); box-shadow: 0 1px 0 var(--red); }
  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }

  .spinner{
    width:30px; height:30px; border-radius:50%; border: 4px solid rgba(255,179,0,0.25); border-top-color: var(--amber);
    animation: spin 0.8s linear infinite; margin-bottom: 14px;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .entry-form{ display:flex; flex-direction:column; gap:14px; width:100%; max-width:320px; margin: 0 auto 6px; }
  .entry-form label{
    font-family:'Baloo Tamma 2','Baloo 2',sans-serif; font-size:0.95rem; color: var(--amber); text-align:left; display:block; margin-bottom:5px;
  }
  .entry-form input{
    width:100%; font-family:'Inter', sans-serif; font-size:1rem; padding: 11px 13px;
    border: none; border-radius:8px; background: var(--cream); color: var(--ink);
  }
  .entry-form input:focus{ outline: 3px solid var(--red); outline-offset:1px; }

  .win-overlay{ position: fixed; inset:0; background: rgba(13,23,18,0.78); display:flex; align-items:center; justify-content:center; z-index:50; padding: 20px; }
  .win-card{
    background: var(--cream); color: var(--ink); border-radius:12px; max-width: 420px; width:100%;
    padding: 26px 22px; text-align:center; box-shadow: 0 10px 0 var(--red);
  }
  .win-card .flag{ font-size:2.3rem; }
  .win-card h2{ font-family:'Baloo 2', sans-serif; margin:6px 0 2px; font-size:1.35rem; }
  .win-card .kn-line{ color: #B0472F; font-size:1rem; margin-bottom:12px; font-family:'Baloo Tamma 2','Baloo 2',sans-serif; }
  .win-stats{
    font-family:'VT323', monospace; font-size:1.05rem; background: var(--board); color: var(--amber);
    border-radius:8px; padding: 10px 14px; margin-bottom: 16px; text-align:left;
  }
  .win-stats .row{ display:flex; justify-content:space-between; margin: 3px 0; }
  .win-trail{ font-size:0.78rem; color: #6b6558; word-break: break-word; margin-bottom: 6px; }

  .toast{
    position: fixed; bottom: 18px; left:50%; transform: translateX(-50%);
    background: var(--board); color: var(--amber); font-family:'Baloo 2', sans-serif; font-weight:600;
    font-size: 0.8rem; padding: 9px 16px; border-radius: 999px; z-index: 60;
    border: 2px solid var(--amber); opacity:0; pointer-events:none; transition: opacity 0.25s ease;
    max-width: 85vw; text-align:center;
  }
  .toast.show{ opacity:1; }

  ::selection{ background: var(--amber); color: var(--ink); }
</style>
</head>

<script>
// Target pool: hundreds of popular Wikipedia titles across people, places, and things.
const NOUN_POOL = [

  "Julius Caesar","Napoleon","Abraham Lincoln","Nelson Mandela","Marie Curie",
  "William Shakespeare","Charles Darwin","Nikola Tesla","Alexander the Great","Genghis Khan",

  "Amelia Earhart","Stephen Hawking","Ada Lovelace","Leonardo Fibonacci","Archimedes",

  "Sigmund Freud","Carl Jung","Immanuel Kant","Rene Descartes",
  "Paris","Tokyo","New York City","London","Mount Everest","Great Wall of China",
  "Eiffel Tower","Taj Mahal","Amazon rainforest","Sahara","Nile","Grand Canyon",
  "Great Barrier Reef","Antarctica","Sydney Opera House","Statue of Liberty",
  "Machu Picchu","Colosseum","Great Pyramid of Giza","Niagara Falls","Venice",
  "Rome","Cairo","Moscow","Beijing","Dubai","Jerusalem","Athens","Berlin","Rio de Janeiro",
  "Himalayas","Andes","Pacific Ocean","Atlantic Ocean","Mediterranean Sea","Iceland",
  "Galapagos Islands","Stonehenge","Petra","Angkor Wat","Mount Fuji","Yellowstone National Park",
  "Elephant","Lion","Tiger","Dolphin","Kangaroo","Penguin","Panda","Blue whale",
  "Octopus","Butterfly","Cheetah","Gorilla","Polar bear","Shark","Eagle","Owl",
  "Coral reef","Volcano","Glacier","Tornado","Earthquake","Rainbow","Aurora",
  "Telescope","Microscope","Internet","Electricity","Gravity","Photosynthesis",
  "DNA","Solar System","Black hole","Robot","Satellite","Computer","Airplane",
  "Steam engine","Periodic table","Vaccine","Nuclear reactor","Artificial intelligence",
  "Chocolate","Sushi","Pizza","Coffee","Tea","Piano","Guitar","Violin","Orchestra",
  "Jazz","Opera","Ballet","Chess","Olympic Games","Origami","Yoga",
  "Compass","Lighthouse","Camera","Umbrella","Diamond","Castle","Submarine",
  "Helicopter","Bicycle","Windmill","Hourglass","Kite","Lantern","Mosaic",
  "Labyrinth","Marathon","Nebula","Zeppelin","Igloo","Cactus","Waterfall"
];

const NAMESPACE_BLOCK = /^\/wiki\/(File|Wikipedia|Help|Special|Talk|Category|Portal|Template|Module|Draft|TimedText|MediaWiki|User|Book|Education_Program)(_talk)?:/i;

const LOADING_LINES = [
  "ಒಂದ್ ನಿಮಿಷ ಕಣ್ರೀ...",
  "ಪೇಜ್ ತಿರುಗುಸ್ತಿದೀನಿ...",
  "ರೂಟ್ ಹುಡುಕ್ತಿದೀನಿ..."
];

let state = { target: null, current: null, trail: [], clicks: 0, won: false, targetBacklinks: null, currentLinkTitles: [] };
let player = { name: '', place: '' }; // held only in memory — never saved, gone on refresh

const topbar = document.getElementById('topbar');
const articleWrap = document.getElementById('article-wrap');
const toastEl = document.getElementById('toast');

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(function(){ toastEl.classList.remove('show'); }, 2000);
}

function normalize(title){
  return decodeURIComponent(title).replace(/_/g,' ').trim().toLowerCase();
}

function randomLoadingLine(){
  return LOADING_LINES[Math.floor(Math.random() * LOADING_LINES.length)];
}

function renderEntryScreen(){
  topbar.style.display = 'none';
  articleWrap.innerHTML =
    '<div class="center-screen">' +
      '<div class="board-icon led">WIKIQUEST</div>' +
      '<h2 class="display">ಟ್ರಿಪ್ ಶುರು ಮಾಡೋಣ್ವಾ?</h2>' +
      '<form class="entry-form" id="entry-form">' +
        '<div>' +
          '<label class="kn" for="name-input">ಯೆನ್ ನಿನ್ ಹೆಸ್ರು?</label>' +
          '<input type="text" id="name-input" placeholder="Your name" maxlength="24" required>' +
        '</div>' +
        '<div>' +
          '<label class="kn" for="place-input">ಯಾವ್ ಊರ್ ನಿಂದು?</label>' +
          '<input type="text" id="place-input" placeholder="Your place" maxlength="24" required>' +
        '</div>' +
        '<div class="btn-row" style="margin-top:6px;">' +
          '<button type="submit" class="btn">ಮುಂದೆ ಹೋಗಿ</button>' +

    '</div>';

    e.preventDefault();
    const name = document.getElementById('name-input').value.trim();
    const place = document.getElementById('place-input').value.trim();
    player.name = name || 'Traveler';
    player.place = place || 'Somewhere';
    renderStartScreen();
  });
}

function renderStartScreen(){
  topbar.style.display = 'none';
  articleWrap.innerHTML =
    '<div class="center-screen">' +
      '<div class="board-icon led">READY?</div>' +
      '<h2 class="display">Namma WIKIQUEST, ' + player.name + '!</h2>' +
      '<div class="kn-line kn">ಬೋರ್ಡ್ ನೋಡ್ಕೊಂಡು ಸರಿಯಾದ ಲಿಂಕ್ ಒತ್ತಿ</div>' +
      '<p>Neevu ondu random Wikipedia page mele land aagteera. Highlighted words mele click maadi, ' +
      'destination word ge reach aagoothanaka. Kammi clicks alli reach aadre, sooper!</p>' +
      '<div class="btn-row">' +
        '<button class="btn" id="start-btn">ಟ್ರಿಪ್ ಶುರು</button>' +
      '</div>' +
    '</div>';
  document.getElementById('start-btn').addEventListener('click', startGame);
}

function renderLoading(msg){
  articleWrap.innerHTML =
    '<div class="center-screen">' +
      '<div class="spinner"></div>' +
      '<p class="kn" style="color:var(--amber); opacity:1;">' + msg + '</p>' +
    '</div>';
}

function renderError(msg, retryFn){
  articleWrap.innerHTML =
    '<div class="center-screen">' +
      '<h2 class="display">ಅಯ್ಯೋ, ರೂಟ್ ತಪ್ಪಿತು!</h2>' +
      '<p>' + msg + '</p>' +
      '<div class="btn-row">' +
        '<button class="btn" id="retry-btn">ಮತ್ತೊಮ್ಮೆ ಟ್ರೈ ಮಾಡಿ</button>' +
      '</div>' +
    '</div>';

}

async function fetchRandomTitle(){
  const url = "https://en.wikipedia.org/w/api.php?action=query&list=random&rnnamespace=0&rnlimit=1&format=json&origin=*";
  const res = await fetch(url);
  if(!res.ok) throw new Error("network");
  const data = await res.json();
  return data.query.random[0].title;
}

async function fetchArticle(title){
  const url = "https://en.wikipedia.org/w/api.php?action=parse&page=" + encodeURIComponent(title) +
    "&redirects=1&format=json&prop=text|displaytitle&origin=*";
  const res = await fetch(url);
  if(!res.ok) throw new Error("network");
  const data = await res.json();
  if(data.error) throw new Error(data.error.info || "not found");
  return {
    title: data.parse.displaytitle.replace(/<[^>]+>/g,''),
    html: data.parse.text['*']
  };
}

async function fetchBacklinks(title){
  const url = "https://en.wikipedia.org/w/api.php?action=query&list=backlinks&bltitle=" +
    encodeURIComponent(title) + "&bllimit=500&blnamespace=0&format=json&origin=*";
  const res = await fetch(url);
  if(!res.ok) throw new Error("network");
  const data = await res.json();
  const set = new Set();
  const links = (data.query && data.query.backlinks) ? data.query.backlinks : [];
  links.forEach(function(b){ set.add(normalize(b.title)); });
  return set;
}

function pickTarget(excludeTitle){
  const candidates = NOUN_POOL.filter(function(n){ return normalize(n) !== normalize(excludeTitle || ''); });
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function countLinks(html){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  return doc.querySelectorAll('a[data-wiki-title]').length;
}

function sanitizeHtml(html, notrim){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const killSelectors = [
    '.mw-editsection', 'sup.reference', 'style', 'script',
    '.noprint', '.ambox', '.hatnote', '.navbox', '.metadata',
    'table.vertical-navbox', '.sistersitebox', '#coordinates', '.mw-empty-elt',
    '.reflist', 'ol.references'
  ];
  killSelectors.forEach(function(sel){
    doc.querySelectorAll(sel).forEach(function(el){ el.remove(); });
  });
  doc.querySelectorAll('a[href]').forEach(function(a){
    const href = a.getAttribute('href');
    if(!href) return;
    if(href.indexOf('/wiki/') === 0 && !NAMESPACE_BLOCK.test(href)){
      a.setAttribute('data-wiki-title', href.replace('/wiki/','').split('#')[0]);
    } else {
      a.classList.add('na-link');
      a.removeAttribute('href');
    }
  });

  if(notrim){
    return doc.body.innerHTML;
  }

  const container = doc.createElement('div');
  let paraCount = 0;
  const MAX_PARAGRAPHS = 9;
  const children = Array.prototype.slice.call(doc.body.children);
  for(let i = 0; i < children.length; i++){
    const child = children[i];
    if(/^H[2-6]$/.test(child.tagName) && paraCount >= 3){
      break;
    }
    container.appendChild(child.cloneNode(true));
    if(child.tagName === 'P' && child.textContent.trim().length > 0){
      paraCount++;
    }
    if(paraCount >= MAX_PARAGRAPHS) break;
  }
  return container.innerHTML;
}

async function getPreparedArticle(title){
  const article = await fetchArticle(title);
  let cleanHtml = sanitizeHtml(article.html, false);
  if(countLinks(cleanHtml) === 0){
    cleanHtml = sanitizeHtml(article.html, true);
  }
  return { title: article.title, html: cleanHtml };
}

function renderTrail(){
  const strip = document.getElementById('trail-strip');
  strip.innerHTML = '';
  state.trail.forEach(function(title, i){
    const chip = document.createElement('span');
    chip.className = 'trail-chip' + (i === state.trail.length - 1 ? ' current' : '');
    chip.textContent = title;
    strip.appendChild(chip);
    if(i < state.trail.length - 1){
      const dots = document.createElement('span');
      dots.className = 'trail-dots';
      strip.appendChild(dots);
    }
  });
  strip.scrollLeft = strip.scrollWidth;
}

function renderArticle(article){
  document.getElementById('current-title').textContent = article.title;
  document.getElementById('target-title').textContent = state.target;
  document.getElementById('click-count').textContent = state.clicks + (state.clicks === 1 ? ' click' : ' clicks');
  document.getElementById('player-row').innerHTML = 'Aadta iddare <span>' + player.name + '</span>, ' + player.place + ' inda';
  renderTrail();

  articleWrap.innerHTML = '<div id="article"><h1 class="article-title">' + article.title + '</h1>' + article.html + '</div>';
  state.currentLinkTitles = Array.prototype.map.call(
    document.querySelectorAll('#article a[data-wiki-title]'),
    function(a){ return a.getAttribute('data-wiki-title'); }
  );

  document.getElementById('article').ad
