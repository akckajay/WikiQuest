<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIKIQUEST — Trail to the Word</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EDE6D6;
    --paper-deep: #E2D9C4;
    --ink: #2A2420;
    --ink-soft: #5B5348;
    --moss: #4F6B4A;
    --moss-deep: #3A5136;
    --rust: #BD5B38;
    --rust-deep: #9C4529;
    --gold: #C99A3E;
    --line: rgba(42,36,32,0.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(42,36,32,0.05) 1px, transparent 0);
    background-size: 22px 22px;
    color: var(--ink);
    font-family: 'Spectral', Georgia, serif;
    min-height: 100vh;
  }
  .mono{ font-family: 'JetBrains Mono', monospace; }

  .topbar{
    position: sticky; top:0; z-index: 20;
    background: var(--paper);
    border-bottom: 2px solid var(--ink);
    padding: 10px 14px 12px;
  }
  .brand{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:8px; }
  .brand h1{
    font-size: 1.05rem; letter-spacing: 0.12em; margin:0;
    font-family:'JetBrains Mono', monospace; font-weight:700; text-transform: uppercase;
  }
  .brand h1 span{ color: var(--rust); }
  .clicks{ font-family:'JetBrains Mono', monospace; font-size:0.72rem; color: var(--ink-soft); white-space:nowrap; }
  .hint-btn{
    font-family:'JetBrains Mono', monospace; font-size:0.68rem; font-weight:600;
    background: var(--gold); color: var(--ink); border: 1.5px solid var(--rust-deep);
    border-radius:999px; padding:4px 10px; cursor:pointer; white-space:nowrap;
  }
  .hint-btn:active{ transform: translateY(1px); }
  #article a.hint-glow{
    background: var(--gold); color: var(--ink) !important; padding: 1px 4px; border-radius:3px;
    text-decoration: none; box-shadow: 0 0 0 2px var(--rust);
  }

  .quest-row{ display:flex; align-items:stretch; gap:8px; flex-wrap: wrap; }
  .quest-card{ flex:1; min-width: 140px; border:1.5px solid var(--ink); border-radius:3px; padding:7px 10px; background: var(--paper-deep); position:relative; }
  .quest-label{ font-family:'JetBrains Mono', monospace; font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color: var(--ink-soft); display:block; margin-bottom:2px; }
  .quest-value{ font-weight:600; font-size:0.95rem; line-height:1.15; }
  .quest-card.target{ background: var(--rust); border-color: var(--rust-deep); }
  .quest-card.target .quest-label{ color: rgba(255,255,255,0.75); }
  .quest-card.target .quest-value{ color:#fff; }
  .quest-card.target::after{ content:"⚑"; position:absolute; right:8px; top:6px; font-size:1rem; color:#fff; }

  .player-row{ margin-top:8px; font-size:0.72rem; color: var(--ink-soft); }
  .player-row span{ color: var(--moss-deep); font-weight:600; }

  .entry-form{ display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; margin: 0 auto 20px; }
  .entry-form label{ font-family:'JetBrains Mono', monospace; font-size:0.78rem; color: var(--ink-soft); text-align:left; display:block; margin-bottom:4px; }
  .entry-form input{
    width:100%; font-family:'Spectral', serif; font-size:1rem; padding: 10px 12px;
    border: 1.5px solid var(--ink); border-radius:3px; background: var(--paper-deep); color: var(--ink);
  }
  .entry-form input:focus{ outline: 2px solid var(--rust); outline-offset:1px; }

  .trail-strip{ margin-top:8px; display:flex; align-items:center; gap:0; overflow-x:auto; padding-bottom:4px; scrollbar-width: thin; }
  .trail-chip{ font-family:'JetBrains Mono', monospace; font-size:0.68rem; background: var(--paper); border:1px solid var(--ink); border-radius: 999px; padding:3px 9px; white-space:nowrap; color: var(--ink-soft); flex-shrink:0; }
  .trail-chip.current{ background: var(--moss); border-color: var(--moss-deep); color:#fff; font-weight:600; }
  .trail-dots{ width:16px; height:1px; border-top: 2px dotted var(--ink-soft); flex-shrink:0; margin: 0 2px; }

  #article-wrap{ padding: 16px 16px 90px; max-width: 720px; margin: 0 auto; }
  #article{ font-size: 1rem; line-height: 1.65; }
  #article h2, #article h3{ font-family:'Spectral', serif; font-weight:600; border-bottom: 1px solid var(--line); padding-bottom:4px; margin-top: 1.6em; }
  #article p{ margin: 0.85em 0; }
  #article a{ color: var(--rust-deep); text-decoration: underline; text-decoration-color: rgba(189,91,56,0.4); text-underline-offset:2px; cursor:pointer; }
  #article a.na-link{ color: var(--ink-soft); text-decoration: none; cursor: default; border-bottom: 1px dotted var(--ink-soft); }
  #article a:hover{ text-decoration-color: var(--rust-deep); }
  #article img{ max-width:100%; height:auto; border-radius:2px; }
  #article table{ max-width:100%; display:block; overflow-x:auto; font-size:0.82rem; border-collapse: collapse;}
  #article .infobox{ font-size: 0.78rem; float:none !important; margin: 1em 0 !important; width:100% !important; border:1px solid var(--line); background: var(--paper-deep); }
  #article sup, #article .mw-editsection, #article .noprint, #article .mw-empty-elt { display:none; }
  #article ul, #article ol{ padding-left: 1.4em; }
  #article table td, #article table th{ padding: 4px 6px; border: 1px solid var(--line); }
  #article h1.article-title{ font-size:1.7rem; font-weight:700; border:none; margin: 0 0 0.4em; padding:0; }

  .center-screen{ min-height: 70vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 24px; }
  .compass{ font-size: 2.4rem; margin-bottom: 6px; }
  .center-screen h2{ font-size:1.5rem; margin: 0 0 8px; font-weight:700; }
  .center-screen p{ max-width: 420px; color: var(--ink-soft); line-height:1.6; margin: 0 0 20px; font-size:0.95rem; }
  .btn{
    font-family:'JetBrains Mono', monospace; font-weight:600; font-size:0.85rem; letter-spacing:0.04em; text-transform:uppercase;
    background: var(--ink); color: var(--paper); border:none; padding: 12px 22px; border-radius:3px; cursor:pointer;
    box-shadow: 3px 3px 0 var(--rust); transition: transform 0.1s ease;
  }
  .btn:active{ transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--rust); }
  .btn.secondary{ background: var(--paper); color: var(--ink); border: 1.5px solid var(--ink); box-shadow: 3px 3px 0 var(--moss); }
  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }

  .spinner{ width:26px; height:26px; border-radius:50%; border: 3px solid var(--line); border-top-color: var(--rust); animation: spin 0.8s linear infinite; margin-bottom: 14px; }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .win-overlay{ position: fixed; inset:0; background: rgba(42,36,32,0.55); display:flex; align-items:center; justify-content:center; z-index:50; padding: 20px; }
  .win-card{ background: var(--paper); border: 2px solid var(--ink); border-radius:5px; max-width: 420px; width:100%; padding: 26px 22px; text-align:center; box-shadow: 6px 6px 0 var(--rust); }
  .win-card .flag{ font-size:2.2rem; }
  .win-card h2{ margin:6px 0 4px; font-size:1.4rem; }
  .win-card p{ color: var(--ink-soft); font-size:0.9rem; margin: 0 0 14px; }
  .win-stats{ font-family:'JetBrains Mono', monospace; font-size:0.85rem; background: var(--paper-deep); border:1px solid var(--line); border-radius:3px; padding: 10px; margin-bottom: 18px; text-align:left; }
  .win-stats .row{ display:flex; justify-content:space-between; margin: 3px 0; }
  .win-trail{ font-size:0.78rem; color: var(--ink-soft); word-break: break-word; }

  .toast{
    position: fixed; bottom: 18px; left:50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); font-family:'JetBrains Mono', monospace;
    font-size: 0.75rem; padding: 8px 14px; border-radius: 4px; z-index: 60;
    opacity:0; pointer-events:none; transition: opacity 0.25s ease;
  }
  .toast.show{ opacity:1; }
  ::selection{ background: var(--gold); color: var(--ink); }
</style>
</head>
<body>

<div id="topbar" class="topbar" style="display:none;">
  <div class="brand">
    <h1>WIKI<span>QUEST</span></h1>
    <div style="display:flex; align-items:center; gap:8px;">
      <button class="hint-btn mono" id="hint-btn">💡 Hint</button>
      <div class="clicks mono" id="click-count">0 clicks</div>
    </div>
  </div>
  <div class="quest-row">
    <div class="quest-card">
      <span class="quest-label">Now reading</span>
      <span class="quest-value" id="current-title">—</span>
    </div>
    <div class="quest-card target">
      <span class="quest-label">Destination</span>
      <span class="quest-value" id="target-title">—</span>
    </div>
  </div>
  <div class="player-row mono" id="player-row"></div>
  <div class="trail-strip" id="trail-strip"></div>
</div>

<div id="article-wrap"></div>
<div class="toast" id="toast"></div>

<script>
// Target pool: hundreds of popular, well-known Wikipedia titles spanning
// people, places, and things — the live Wikipedia API supplies everything else.
const NOUN_POOL = [
  // People
  "Albert Einstein","Isaac Newton","Leonardo da Vinci","Mahatma Gandhi","Cleopatra",
  "Julius Caesar","Napoleon","Abraham Lincoln","Nelson Mandela","Marie Curie",
  "William Shakespeare","Charles Darwin","Nikola Tesla","Alexander the Great","Genghis Khan",
  "Confucius","Aristotle","Socrates","Plato","Galileo Galilei","Thomas Edison",
  "Wright brothers","Martin Luther King Jr.","Winston Churchill","Elizabeth II","Mark Twain",
  "Vincent van Gogh","Pablo Picasso","Wolfgang Amadeus Mozart","Ludwig van Beethoven",
  "Christopher Columbus","Marco Polo","Joan of Arc","Florence Nightingale","Rosa Parks",
  "Amelia Earhart","Stephen Hawking","Ada Lovelace","Leonardo Fibonacci","Archimedes",
  "Hippocrates","Homer","Michelangelo","Rembrandt","Ludwig Wittgenstein","Karl Marx",
  "Sigmund Freud","Carl Jung","Immanuel Kant","Rene Descartes",
  // Places
  "Paris","Tokyo","New York City","London","Mount Everest","Great Wall of China",
  "Eiffel Tower","Taj Mahal","Amazon rainforest","Sahara","Nile","Grand Canyon",
  "Great Barrier Reef","Antarctica","Sydney Opera House","Statue of Liberty",
  "Machu Picchu","Colosseum","Great Pyramid of Giza","Niagara Falls","Venice",
  "Rome","Cairo","Moscow","Beijing","Dubai","Jerusalem","Athens","Berlin","Rio de Janeiro",
  "Himalayas","Andes","Pacific Ocean","Atlantic Ocean","Mediterranean Sea","Iceland",
  "Galapagos Islands","Stonehenge","Petra","Angkor Wat","Mount Fuji","Yellowstone National Park",
  // Animals & nature
  "Elephant","Lion","Tiger","Dolphin","Kangaroo","Penguin","Panda","Blue whale",
  "Octopus","Butterfly","Cheetah","Gorilla","Polar bear","Shark","Eagle","Owl",
  "Coral reef","Volcano","Glacier","Tornado","Earthquake","Rainbow","Aurora",
  // Science & tech
  "Telescope","Microscope","Internet","Electricity","Gravity","Photosynthesis",
  "DNA","Solar System","Black hole","Robot","Satellite","Computer","Airplane",
  "Steam engine","Periodic table","Vaccine","Nuclear reactor","Artificial intelligence",
  // Culture & food
  "Chocolate","Sushi","Pizza","Coffee","Tea","Piano","Guitar","Violin","Orchestra",
  "Jazz","Opera","Ballet","Chess","Olympic Games","Origami","Yoga",
  // Objects & concepts
  "Compass","Lighthouse","Camera","Umbrella","Diamond","Castle","Submarine",
  "Helicopter","Bicycle","Windmill","Hourglass","Kite","Lantern","Mosaic",
  "Labyrinth","Marathon","Nebula","Zeppelin","Igloo","Cactus","Waterfall"
];

const NAMESPACE_BLOCK = /^\/wiki\/(File|Wikipedia|Help|Special|Talk|Category|Portal|Template|Module|Draft|TimedText|MediaWiki|User|Book|Education_Program)(_talk)?:/i;

let state = { target: null, current: null, trail: [], clicks: 0, won: false, targetBacklinks: null, currentLinkTitles: [] };
let player = { name: '', place: '' }; // held only in memory — never saved, gone on refresh

const topbar = document.getElementById('topbar');
const articleWrap = document.getElementById('article-wrap');
const toastEl = document.getElementById('toast');

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=> toastEl.classList.remove('show'), 1800);
}

function normalize(title){
  return decodeURIComponent(title).replace(/_/g,' ').trim().toLowerCase();
}

function renderEntryScreen(){
  topbar.style.display = 'none';
  articleWrap.innerHTML = `
    <div class="center-screen">
      <div class="compass">🧭</div>
      <h2>WIKIQUEST</h2>
      <form class="entry-form" id="entry-form">
        <div>
          <label for="name-input">ಯೆನ್ ನಿನ್ ಹೆಸ್ರು?</label>
          <input type="text" id="name-input" placeholder="Your name" maxlength="24" required>
        </div>
        <div>
          <label for="place-input">ಯಾವ್ ಊರ್ ನಿಂದು?</label>
          <input type="text" id="place-input" placeholder="Your place" maxlength="24" required>
        </div>
        <div class="btn-row" style="margin-top:6px;">
          <button type="submit" class="btn">Continue</button>
        </div>
      </form>
    </div>
  `;
  document.getElementById('entry-form').addEventListener('submit', function(e){
    e.preventDefault();
    const name = document.getElementById('name-input').value.trim();
    const place = document.getElementById('place-input').value.trim();
    player.name = name || 'Traveler';
    player.place = place || 'Somewhere';
    renderStartScreen();
  });
}

function renderStartScreen(){
  topbar.style.display = 'none';
  articleWrap.innerHTML = `
    <div class="center-screen">
      <div class="compass">🧭</div>
      <h2>WIKIQUEST</h2>
      <p>You'll land on a random Wikipedia page. Click through its links, subject to subject,
      until you reach the destination word. Every click counts — find the shortest trail.</p>
      <div class="btn-row">
        <button class="btn" id="start-btn">Begin quest</button>
      </div>
    </div>
  `;
  document.getElementById('start-btn').addEventListener('click', startGame);
}

function renderLoading(msg){
  articleWrap.innerHTML = `
    <div class="center-screen">
      <div class="spinner"></div>
      <p>${msg}</p>
    </div>
  `;
}

function renderError(msg, retryFn){
  articleWrap.innerHTML = `
    <div class="center-screen">
      <h2>Trail lost</h2>
      <p>${msg}</p>
      <div class="btn-row">
        <button class="btn" id="retry-btn">Try again</button>
      </div>
    </div>
  `;
  document.getElementById('retry-btn').addEventListener('click', retryFn);
}

async function fetchBacklinks(title){
  const url = "https://en.wikipedia.org/w/api.php?action=query&list=backlinks&bltitle=" +
    encodeURIComponent(title) + "&bllimit=500&blnamespace=0&format=json&origin=*";
  const res = await fetch(url);
  if(!res.ok) throw new Error("network");
  const data = await res.json();
  const set = new Set();
  (data.query && data.query.backlinks ? data.query.backlinks : []).forEach(b => set.add(normalize(b.title)));
  return set;
}

async function fetchRandomTitle(){
  const url = "https://en.wikipedia.org/w/api.php?action=query&list=random&rnnamespace=0&rnlimit=1&format=json&origin=*";
  const res = await fetch(url);
  if(!res.ok) throw new Error("network");
  const data = await res.json();
  return data.query.random[0].title;
}

async function fetchArticle(title){
  const url = "https://en.wikipedia.org/w/api.php?action=parse&page=" + encodeURIComponent(title) +
    "&redirects=1&format=json&prop=text|displaytitle&origin=*";
  const res = await fetch(url);
  if(!res.ok) throw new Error("network");
  const data = await res.json();
  if(data.error) throw new Error(data.error.info || "not found");
  return {
    title: data.parse.displaytitle.replace(/<[^>]+>/g,''),
    html: data.parse.text['*']
  };
}

async function getPreparedArticle(title){
  const article = await fetchArticle(title);
  let cleanHtml = sanitizeHtml(article.html, false);
  if(countLinks(cleanHtml) === 0){
    cleanHtml = sanitizeHtml(article.html, true); // fall back to the untrimmed body
  }
  return { title: article.title, html: cleanHtml };
}

function countLinks(html){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  return doc.querySelectorAll('a[data-wiki-title]').length;
}

function pickTarget(excludeTitle){
  let candidates = NOUN_POOL.filter(n => normalize(n) !== normalize(excludeTitle || ''));
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function sanitizeHtml(html, notrim){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const killSelectors = [
    '.mw-editsection', 'sup.reference', 'style', 'script',
    '.noprint', '.ambox', '.hatnote', '.navbox', '.metadata',
    'table.vertical-navbox', '.sistersitebox', '#coordinates', '.mw-empty-elt',
    '.reflist', 'ol.references'
  ];
  killSelectors.forEach(sel=>{
    doc.querySelectorAll(sel).forEach(el => el.remove());
  });
  doc.querySelectorAll('a[href]').forEach(a=>{
    const href = a.getAttribute('href');
    if(!href) return;
    if(href.startsWith('/wiki/') && !NAMESPACE_BLOCK.test(href)){
      a.setAttribute('data-wiki-title', href.replace('/wiki/','').split('#')[0]);
    } else {
      a.classList.add('na-link');
      a.removeAttribute('href');
    }
  });

  if(notrim){
    return doc.body.innerHTML;
  }

  // Keep only the lead + a bit of the first section, so pages stay short
  // but still carry enough links to give real navigation choices.
  const container = doc.createElement('div');
  let paraCount = 0;
  const MAX_PARAGRAPHS = 9;
  for(const child of Array.from(doc.body.children)){
    if(/^H[2-6]$/.test(child.tagName) && paraCount >= 3){
      break; // stop once we've passed a real section heading after some content
    }
    container.appendChild(child.cloneNode(true));
    if(child.tagName === 'P' && child.textContent.trim().length > 0){
      paraCount++;
    }
    if(paraCount >= MAX_PARAGRAPHS) break;
  }
  return container.innerHTML;
}

function renderTrail(){
  const strip = document.getElementById('trail-strip');
  strip.innerHTML = '';
  state.trail.forEach((title, i)=>{
    const chip = document.createElement('span');
    chip.className = 'trail-chip' + (i === state.trail.length - 1 ? ' current' : '');
    chip.textContent = title;
    strip.appendChild(chip);
    if(i < state.trail.length - 1){
      const dots = document.createElement('span');
      dots.className = 'trail-dots';
      strip.appendChild(dots);
    }
  });
  strip.scrollLeft = strip.scrollWidth;
}

function renderArticle(article){
  document.getElementById('current-title').textContent = article.title;
  document.getElementById('target-title').textContent = state.target;
  document.getElementById('click-count').textContent = state.clicks + (state.clicks === 1 ? ' click' : ' clicks');
  document.getElementById('player-row').innerHTML = `Playing as <span>${player.name}</span> from <span>${player.place}</span>`;
  renderTrail();

  articleWrap.innerHTML = `<div id="article"><h1 class="article-title">${article.title}</h1>${article.html}</div>`;
  state.currentLinkTitles = Array.from(document.querySelectorAll('#article a[data-wiki-title]'))
    .map(a => a.getAttribute('data-wiki-title'));

  document.getElementById('article').addEventListener('click', function(e){
    const link = e.target.closest('a');
    if(!link) return;
    e.preventDefault();
    const wikiTitle = link.getAttribute('data-wiki-title');
    if(!wikiTitle){
      showToast("That link isn't part of the trail");
      return;
    }
    handleNavigate(decodeURIComponent(wikiTitle).replace(/_/g,' '));
  });
}

async function handleHint(){
  const btn = document.getElementById('hint-btn');
  if(!btn) return;
  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = '💡 …';
  try{
    if(!state.targetBacklinks){
      state.targetBacklin
