name: Generate APK
on:
  push:
    branches:
      - main
      - master # Triggers the build whenever you update your code

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Convert Website to APK
        uses: darkshredder/website-to-apk-action@v1
        with:
          app-name: "WikiQuest"
          # Points to where your index.html is located (the root of your project)
          build-folder-path: "./" 

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: WikiQuest-Android-APK
          path: apk/
