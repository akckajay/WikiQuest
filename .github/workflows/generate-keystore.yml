name: Generate Signing Keystore

# Run this ONCE manually from the Actions tab. It creates your app's signing
# key entirely on GitHub's servers (no local Java/keytool needed).
# Download the resulting keystore from the workflow run and back it up safely —
# losing it means you can never update this app again under the same identity.

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias wikiquest \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore android.keystore \
            -storepass wikiquest123 \
            -keypass wikiquest123 \
            -dname "CN=WikiQuest, OU=Personal, O=Personal, L=Bengaluru, ST=Karnataka, C=IN"

      - name: Print SHA-256 fingerprint (needed for assetlinks.json later)
        run: |
          keytool -list -v -keystore android.keystore -storepass wikiquest123 -alias wikiquest | grep "SHA256:"

      - name: Upload keystore as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: android.keystore
          retention-days: 90
